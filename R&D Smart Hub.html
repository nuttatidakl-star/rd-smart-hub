<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>R&D Smart Hub</title>
<link rel="stylesheet" href="styles.css" />
<style>
  /* AI thinking dots */
  .ai-dot {
    width: 6px; height: 6px;
    background: var(--color-primary);
    border-radius: 50%;
    display: inline-block;
    animation: ai-blink 1.2s infinite;
    margin: 0 1px;
  }
  @keyframes ai-blink {
    0%, 60%, 100% { opacity: 0.25; }
    30% { opacity: 1; }
  }
</style>
</head>
<body>
<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Data -->
<script src="data.js"></script>

<!-- Components (order matters: app-state + icons first, then leaf views, then app) -->
<script type="text/babel" src="app-state.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="sidebar.jsx"></script>
<script type="text/babel" src="dashboard.jsx"></script>
<script type="text/babel" src="meetings.jsx"></script>
<script type="text/babel" src="rm-database.jsx"></script>
<script type="text/babel" src="guidelines.jsx"></script>
<script type="text/babel" src="assistant.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

</body>
</html>
